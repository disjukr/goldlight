<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>goldlight React authoring browser example</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: sans-serif;
        background: #05070b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(69, 150, 120, 0.25), transparent 38%),
          radial-gradient(circle at bottom right, rgba(82, 108, 188, 0.22), transparent 42%),
          #05070b;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 24px;
      }

      canvas {
        border: 1px solid rgba(255, 255, 255, 0.12);
        width: min(640px, calc(100vw - 48px));
        height: auto;
        background: #000;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="app" width="640" height="480"></canvas>
      <p>
        Built from the current `goldlight/react` authoring API, lowered into Scene IR, then rendered
        through the forward path.
      </p>
    </main>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
